<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albums</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-loader" id="topLoader"></div>

  <nav class="nav glass">
    <div class="nav-container">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn" href="gallery.html">Gallery</a>
      <a class="nav-btn" href="albums.html">Albums</a>
      <a class="nav-btn" href="portfolio.html">Portfolio</a>
    </div>
  </nav>

  <main class="container page-main">
    <section id="albumsSection">
      <div class="section-header">
        <h2>Albums</h2>
      </div>
      <div class="album-grid" id="albumGrid"></div>
      <div class="empty-state" id="albumsEmpty">
        <div class="empty-state-icon">📁</div>
        <div class="empty-state-text">No albums yet</div>
        <div class="empty-state-hint">Add folders under <code>albums/</code> (e.g. <code>albums/travel</code>) with images, then run <code>node scripts/build-data.js</code></div>
      </div>
    </section>
  </main>

  <!-- Album Viewer Modal -->
  <div id="albumViewerModal" class="modal album-viewer-modal">
    <div class="album-viewer-container">
      <div class="alb-viewer-header">
        <h3 id="viewerAlbumName">Album</h3>
        <button class="de-tb-btn" id="viewerCloseBtn">&times; Close</button>
      </div>
      <div class="alb-viewer-grid" id="albumViewerGrid"></div>
      <div class="empty-state" id="viewerEmpty" style="display:none;">
        <div class="empty-state-icon">🖼️</div>
        <div class="empty-state-text">No photos in this album</div>
      </div>
    </div>
  </div>

  <div id="photoZoomLightbox" class="lightbox photo-zoom-lightbox">
    <button class="lightbox-close-btn" id="zoomCloseBtn">×</button>
    <img id="zoomImage" src="" alt="Zoomed photo">
  </div>

  <script src="common.js"></script>
  <script>
    var topLoader = document.getElementById('topLoader');
    function showLoader() { topLoader.classList.add('active'); }
    function hideLoader() { topLoader.classList.remove('active'); }

    var albumGrid = document.getElementById('albumGrid');
    var albumsEmpty = document.getElementById('albumsEmpty');
    var albumViewerModal = document.getElementById('albumViewerModal');
    var albumViewerGrid = document.getElementById('albumViewerGrid');
    var viewerEmpty = document.getElementById('viewerEmpty');
    var photoZoomLightbox = document.getElementById('photoZoomLightbox');
    var zoomImage = document.getElementById('zoomImage');
    var currentViewingAlbum = null;

    function openAlbumViewer(album) {
      currentViewingAlbum = album;
      document.getElementById('viewerAlbumName').textContent = album.name;
      if (!album.images || album.images.length === 0) {
        albumViewerGrid.style.display = 'none';
        viewerEmpty.style.display = 'block';
      } else {
        viewerEmpty.style.display = 'none';
        albumViewerGrid.style.display = 'grid';
        albumViewerGrid.innerHTML = album.images.map(function(src) {
          var name = src.split('/').pop();
          return '<div class="alb-photo-card"><img src="' + src + '" alt="' + name + '" loading="lazy"><div class="gallery-item-name">' + (name.length > 18 ? name.substring(0, 18) + '…' : name) + '</div></div>';
        }).join('');
        albumViewerGrid.querySelectorAll('.alb-photo-card').forEach(function(card, i) {
          card.addEventListener('click', function() {
            openPhotoZoom(album.images[i]);
          });
        });
      }
      albumViewerModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeAlbumViewer() {
      albumViewerModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function openPhotoZoom(src) {
      zoomImage.src = src;
      photoZoomLightbox.classList.add('active');
    }
    function closePhotoZoom() {
      photoZoomLightbox.classList.remove('active');
    }

    function renderAlbumGrid(albums) {
      if (!albums || albums.length === 0) {
        albumGrid.style.display = 'none';
        albumsEmpty.style.display = 'block';
        hideLoader();
        return;
      }
      albumGrid.style.display = 'grid';
      albumsEmpty.style.display = 'none';
      var coverUrl = '';
      var cards = albums.map(function(album) {
        var firstImg = album.images && album.images[0];
        coverUrl = firstImg || '';
        var count = album.images ? album.images.length : 0;
        return '<div class="album-card" data-album-id="' + album.id + '">' +
          '<div class="album-card-image">' +
          (coverUrl ? '<img src="' + coverUrl + '" alt="' + (album.name || '') + '">' : '<div class="album-card-placeholder"></div>') +
          '</div>' +
          '<div class="album-card-info">' +
          '<h3 class="album-card-title">' + (album.name || album.id) + '</h3>' +
          '<p class="album-card-meta">' + count + ' photo' + (count !== 1 ? 's' : '') + '</p>' +
          '</div></div>';
      }).join('');
      albumGrid.innerHTML = cards;
      albumGrid.querySelectorAll('.album-card').forEach(function(card) {
        card.addEventListener('click', function() {
          var album = albums.find(function(a) { return a.id === card.dataset.albumId; });
          if (album) openAlbumViewer(album);
        });
      });
      hideLoader();
    }

    document.getElementById('viewerCloseBtn').addEventListener('click', closeAlbumViewer);
    albumViewerModal.addEventListener('click', function(e) { if (e.target === albumViewerModal) closeAlbumViewer(); });
    document.getElementById('zoomCloseBtn').addEventListener('click', closePhotoZoom);
    photoZoomLightbox.addEventListener('click', function(e) { if (e.target === photoZoomLightbox) closePhotoZoom(); });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (photoZoomLightbox.classList.contains('active')) closePhotoZoom();
        else if (albumViewerModal.classList.contains('active')) closeAlbumViewer();
      }
    });

    setActiveNav();

    fetch('data/albums.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        renderAlbumGrid(data.albums || []);
      })
      .catch(function() {
        renderAlbumGrid([]);
      });
  </script>
</body>
</html>
