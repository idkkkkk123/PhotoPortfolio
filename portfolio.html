<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-loader" id="topLoader"></div>

  <nav class="nav glass">
    <div class="nav-container">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn" href="gallery.html">Gallery</a>
      <a class="nav-btn" href="upload.html">Upload</a>
      <a class="nav-btn" href="display.html">Display</a>
      <a class="nav-btn" href="albums.html">Albums</a>
      <a class="nav-btn" href="portfolio.html">Portfolio</a>
    </div>
  </nav>

  <main class="container page-main">
    <section>
      <div class="section-header">
        <h2>Portfolio</h2>
      </div>

      <div class="portfolio-grid" id="portfolioGrid"></div>

      <div class="empty-state" id="portfolioEmpty">
        <div class="empty-state-icon">🎨</div>
        <div class="empty-state-text">No portfolio items yet</div>
        <div class="empty-state-hint">Create a display and click "Portfolio" to add it here</div>
      </div>
    </section>
  </main>

  <!-- Portfolio Lightbox -->
  <div class="lightbox" id="portfolioLightbox">
    <button class="lightbox-close" id="portfolioLbClose">×</button>
    <div class="portfolio-lb-body">
      <div class="portfolio-lb-img-wrap">
        <img id="portfolioLbImg" src="" alt="">
      </div>
      <div class="portfolio-lb-info">
        <h3 id="portfolioLbTitle">—</h3>
        <p id="portfolioLbDesc" class="portfolio-lb-desc">—</p>
        <div class="portfolio-lb-meta">
          <span id="portfolioLbDate">—</span>
        </div>
      </div>
    </div>
  </div>

  <script src="common.js"></script>
  <script>
    const portfolioGrid = document.getElementById('portfolioGrid');
    const portfolioEmpty = document.getElementById('portfolioEmpty');
    const portfolioLightbox = document.getElementById('portfolioLightbox');

    function loadPortfolio() {
      const raw = localStorage.getItem(STORAGE_KEYS.portfolio);
      return raw ? JSON.parse(raw) : [];
    }
    function savePortfolio(items) {
      localStorage.setItem(STORAGE_KEYS.portfolio, JSON.stringify(items));
    }

    function renderPortfolio() {
      const items = loadPortfolio();

      if (items.length === 0) {
        portfolioGrid.style.display = 'none';
        portfolioEmpty.style.display = 'block';
        return;
      }

      portfolioGrid.style.display = 'grid';
      portfolioEmpty.style.display = 'none';

      portfolioGrid.innerHTML = items.map((item, index) => {
        const truncTitle = (item.title || 'Untitled').length > 30
          ? (item.title || 'Untitled').substring(0, 30) + '…'
          : (item.title || 'Untitled');
        const truncDesc = (item.description || '').length > 60
          ? (item.description || '').substring(0, 60) + '…'
          : (item.description || '');
        return `
        <div class="portfolio-card" data-index="${index}" style="animation-delay:${Math.min(index * 0.05, 0.5)}s">
          <div class="portfolio-card-img">
            <img src="${item.thumbnail}" alt="${item.title || ''}" loading="lazy">
            <button class="portfolio-card-del" data-index="${index}" title="Remove">×</button>
          </div>
          <div class="portfolio-card-info">
            <h3 class="portfolio-card-title">${truncTitle}</h3>
            ${truncDesc ? `<p class="portfolio-card-desc">${truncDesc}</p>` : ''}
            <span class="portfolio-card-date">${new Date(item.createdAt).toLocaleDateString()}</span>
          </div>
        </div>`;
      }).join('');

      portfolioGrid.querySelectorAll('.portfolio-card').forEach(card => {
        card.addEventListener('click', e => {
          if (e.target.classList.contains('portfolio-card-del')) return;
          const idx = parseInt(card.dataset.index, 10);
          openPortfolioLightbox(idx);
        });
      });

      portfolioGrid.querySelectorAll('.portfolio-card-del').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const idx = parseInt(btn.dataset.index, 10);
          const items = loadPortfolio();
          items.splice(idx, 1);
          savePortfolio(items);
          renderPortfolio();
        });
      });
    }

    function openPortfolioLightbox(index) {
      const items = loadPortfolio();
      const item = items[index];
      if (!item) return;
      document.getElementById('portfolioLbImg').src = item.thumbnail;
      document.getElementById('portfolioLbTitle').textContent = item.title || 'Untitled';
      document.getElementById('portfolioLbDesc').textContent = item.description || '';
      document.getElementById('portfolioLbDate').textContent = new Date(item.createdAt).toLocaleDateString();
      portfolioLightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closePortfolioLightbox() {
      portfolioLightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    document.getElementById('portfolioLbClose').addEventListener('click', closePortfolioLightbox);
    portfolioLightbox.addEventListener('click', e => {
      if (e.target === portfolioLightbox) closePortfolioLightbox();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && portfolioLightbox.classList.contains('active')) closePortfolioLightbox();
    });

    setActiveNav();
    renderPortfolio();
  </script>
</body>
</html>
