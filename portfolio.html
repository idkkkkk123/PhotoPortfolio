<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body>
  <div class="top-loader" id="topLoader"></div>

  <nav class="nav glass">
    <div class="nav-container">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn" href="gallery.html">Gallery</a>
      <a class="nav-btn" href="albums.html">Albums</a>
      <a class="nav-btn" href="portfolio.html">Portfolio</a>
    </div>
  </nav>

  <main class="container page-main">
    <section>
      <div class="section-header">
        <h2>Portfolio</h2>
        <p class="section-subtitle">Your friend’s most memorable work.</p>
      </div>

      <div class="portfolio-grid" id="portfolioGrid"></div>

      <div class="empty-state" id="portfolioEmpty">
        <div class="empty-state-icon">🎨</div>
        <div class="empty-state-text">No portfolio items yet</div>
        <div class="empty-state-hint">Ask your friend to upload portfolio images in Admin</div>
      </div>
    </section>
  </main>

  <!-- Portfolio Lightbox -->
  <div class="lightbox" id="portfolioLightbox">
    <button class="lightbox-close" id="portfolioLbClose">×</button>

    <div class="portfolio-lb-body">
      <div class="portfolio-lb-img-wrap">
        <img id="portfolioLbImg" src="" alt="">
      </div>

      <div class="portfolio-lb-info">
        <h3 id="portfolioLbTitle">—</h3>
        <p id="portfolioLbDesc" class="portfolio-lb-desc">—</p>
        <div class="portfolio-lb-meta">
          <span id="portfolioLbDate">—</span>
        </div>
      </div>
    </div>

    <a class="lightbox-download-btn" id="portfolioLbDownloadBtn" href="#" download>Download</a>
  </div>

  <script src="common.js?v=3"></script>
  <script>
    const topLoader = document.getElementById('topLoader');
    function showLoader() { topLoader.classList.add('active'); }
    function hideLoader() { topLoader.classList.remove('active'); }

    const portfolioGrid = document.getElementById('portfolioGrid');
    const portfolioEmpty = document.getElementById('portfolioEmpty');
    const portfolioLightbox = document.getElementById('portfolioLightbox');

    const portfolioLbImg = document.getElementById('portfolioLbImg');
    const portfolioLbTitle = document.getElementById('portfolioLbTitle');
    const portfolioLbDesc = document.getElementById('portfolioLbDesc');
    const portfolioLbDate = document.getElementById('portfolioLbDate');
    const portfolioLbDownloadBtn = document.getElementById('portfolioLbDownloadBtn');
    const portfolioLbClose = document.getElementById('portfolioLbClose');

    let portfolioItems = [];
    let currentPortfolioIndex = 0;

    function safeFilename(name) {
      return String(name || 'portfolio-photo').trim().replace(/[\\/:*?"<>|]+/g, '-');
    }

    function detectFormatFromSrc(src) {
      const s = src ? String(src) : '';
      const m = s.match(/\.([a-zA-Z0-9]+)(\?.*)?$/);
      return m && m[1] ? m[1].toLowerCase() : null;
    }

    let lastPortfolioSig = '';

    async function renderPortfolio(options = {}) {
      const silent = !!options.silent;
      if (!silent) showLoader();
      const loaded = await loadStaticPortfolioItems();
      const sig = JSON.stringify(loaded || []);
      if (silent && sig === lastPortfolioSig) {
        if (!silent) hideLoader();
        return;
      }
      lastPortfolioSig = sig;
      portfolioItems = loaded;

      if (!portfolioItems || portfolioItems.length === 0) {
        portfolioGrid.style.display = 'none';
        portfolioEmpty.style.display = 'block';
        hideLoader();
        return;
      }

      portfolioItems = [...portfolioItems].sort((a, b) => (a.order || 0) - (b.order || 0));

      portfolioGrid.style.display = 'grid';
      portfolioEmpty.style.display = 'none';

      portfolioGrid.innerHTML = portfolioItems.map((item, index) => `
        <div class="portfolio-card" data-index="${index}" style="animation-delay:${Math.min(index * 0.05, 0.5)}s">
          <div class="portfolio-card-img">
            <img src="${item.src}" alt="${item.title || ''}" loading="lazy">
          </div>
          <div class="portfolio-card-info">
            <h3 class="portfolio-card-title">${(item.title || 'Untitled').length > 42 ? (item.title || 'Untitled').substring(0, 42) + '…' : item.title || 'Untitled'}</h3>
            ${item.description ? `<p class="portfolio-card-desc">${item.description}</p>` : ''}
            <span class="portfolio-card-date">${item.createdAt ? new Date(item.createdAt).toLocaleDateString() : ''}</span>
          </div>
        </div>
      `).join('');

      portfolioGrid.querySelectorAll('.portfolio-card').forEach(card => {
        card.addEventListener('click', () => {
          const idx = parseInt(card.dataset.index, 10);
          openPortfolioLightbox(idx);
        });
      });

      hideLoader();
    }

    function openPortfolioLightbox(index) {
      currentPortfolioIndex = index;
      const item = portfolioItems[currentPortfolioIndex];
      if (!item) return;

      portfolioLbImg.src = item.src;
      portfolioLbTitle.textContent = item.title || 'Untitled';
      portfolioLbDesc.textContent = item.description || '';
      portfolioLbDate.textContent = item.createdAt ? new Date(item.createdAt).toLocaleDateString() : '—';

      portfolioLbDownloadBtn.href = item.src;
      const fmt = detectFormatFromSrc(item.src);
      const dlName = `${safeFilename(item.title || 'portfolio-photo')}${fmt ? '.' + fmt : ''}`;
      portfolioLbDownloadBtn.setAttribute('download', dlName);

      portfolioLightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closePortfolioLightbox() {
      portfolioLightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    portfolioLbClose.addEventListener('click', closePortfolioLightbox);
    portfolioLightbox.addEventListener('click', e => { if (e.target === portfolioLightbox) closePortfolioLightbox(); });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && portfolioLightbox.classList.contains('active')) closePortfolioLightbox();
    });

    setActiveNav();
    renderPortfolio();
    startLiveContentSync(renderPortfolio);
  </script>
</body>
</html>
