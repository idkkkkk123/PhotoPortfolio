<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-loader" id="topLoader"></div>

  <nav class="nav glass">
    <div class="nav-container">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn active" href="gallery.html">Gallery</a>
      <a class="nav-btn" href="albums.html">Albums</a>
      <a class="nav-btn" href="portfolio.html">Portfolio</a>
    </div>
  </nav>

  <main class="container page-main">
    <section id="gallery">
      <div class="section-header">
        <h2>Gallery</h2>
      </div>
      <div class="filter-controls">
        <label for="gallerySortSelect">Sort by:</label>
        <select id="gallerySortSelect">
          <option value="nameAsc">A to Z</option>
          <option value="nameDesc">Z to A</option>
        </select>
      </div>
      <div class="gallery-grid" id="galleryGrid"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">📸</div>
        <div class="empty-state-text">No photos yet</div>
        <div class="empty-state-hint">Admin can add photos through the admin panel</div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">×</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">›</button>
    <div class="lightbox-body">
      <div class="lightbox-img-wrap" id="lightboxImgWrap">
        <img id="lightboxImg" src="" alt="">
      </div>
      <div class="lightbox-info" id="lightboxInfo" style="display:none;">
        <div class="lightbox-info-row"><span class="lightbox-info-label">Filename</span><span class="lightbox-info-val" id="lbInfoName">—</span></div>
        <div class="lightbox-info-row"><span class="lightbox-info-label">Resolution</span><span class="lightbox-info-val" id="lbInfoRes">—</span></div>
        <div class="lightbox-info-row"><span class="lightbox-info-label">Aspect Ratio</span><span class="lightbox-info-val" id="lbInfoAspect">—</span></div>
        <div class="lightbox-info-row"><span class="lightbox-info-label">Format</span><span class="lightbox-info-val" id="lbInfoFormat">—</span></div>
      </div>
    </div>
    <button class="lightbox-info-btn" id="lightboxInfoBtn" title="Toggle Info">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
    </button>
    <button class="lightbox-zoom-btn" id="lightboxZoomBtn" title="Toggle Zoom">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M11 8v6M8 11h6"/></svg>
    </button>
  </div>

  <script src="common.js"></script>
  <script>
    var topLoader = document.getElementById('topLoader');
    function showLoader() { topLoader.classList.add('active'); }
    function hideLoader() { topLoader.classList.remove('active'); }

    var photos = [];
    var currentSortType = 'nameAsc';
    var currentLightboxIndex = 0;
    var currentPhotoList = [];
    var isZoomMode = false;
    var zoomLevel = 1;
    var panX = 0, panY = 0, isPanning = false, panStartX = 0, panStartY = 0;

    var galleryGrid = document.getElementById('galleryGrid');
    var emptyState = document.getElementById('emptyState');
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightboxImg');
    var lightboxImgWrap = document.getElementById('lightboxImgWrap');
    var lightboxClose = document.getElementById('lightboxClose');
    var lightboxPrev = document.getElementById('lightboxPrev');
    var lightboxNext = document.getElementById('lightboxNext');
    var lightboxInfoBtn = document.getElementById('lightboxInfoBtn');
    var lightboxInfo = document.getElementById('lightboxInfo');
    var lightboxZoomBtn = document.getElementById('lightboxZoomBtn');
    var gallerySortSelect = document.getElementById('gallerySortSelect');

    function renderGallery() {
      showLoader();
      var filteredPhotos = sortPhotos(photos, currentSortType);

      if (filteredPhotos.length === 0) {
        galleryGrid.style.display = 'none';
        emptyState.style.display = 'block';
        hideLoader();
        return;
      }

      galleryGrid.style.display = 'grid';
      emptyState.style.display = 'none';

      galleryGrid.innerHTML = filteredPhotos.map(function(photo, index) {
        var name = photo.name || 'Photo';
        var truncName = name.length > 22 ? name.substring(0, 22) + '…' : name;
        return '<div class="gallery-item" style="animation-delay: ' + Math.min(index * 0.03, 0.6) + 's" data-index="' + index + '">' +
          '<img src="' + photo.src + '" alt="' + (photo.name || '') + '" loading="lazy">' +
          '<div class="gallery-item-name">' + truncName + '</div></div>';
      }).join('');

      galleryGrid.querySelectorAll('.gallery-item').forEach(function(item) {
        item.addEventListener('click', function() {
          var index = parseInt(item.dataset.index, 10);
          openLightbox(index, filteredPhotos);
        });
      });
      hideLoader();
    }

    function openLightbox(index, photoList) {
      currentLightboxIndex = index;
      currentPhotoList = photoList;
      updateLightboxContent();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
      exitZoom();
    }

    function updateLightboxContent() {
      var photo = currentPhotoList[currentLightboxIndex];
      if (!photo) return;
      lightboxImg.src = photo.src;
      document.getElementById('lbInfoName').textContent = photo.name || '—';
      var ext = (photo.name || '').split('.').pop();
      document.getElementById('lbInfoFormat').textContent = ext ? ext.toUpperCase() : '—';
      var tmpImg = new Image();
      tmpImg.onload = function() {
        var w = tmpImg.naturalWidth, h = tmpImg.naturalHeight;
        document.getElementById('lbInfoRes').textContent = w + ' × ' + h;
        var g = gcd(w, h);
        document.getElementById('lbInfoAspect').textContent = (w/g) + ':' + (h/g);
      };
      tmpImg.src = photo.src;
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      exitZoom();
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', function() {
      currentLightboxIndex = (currentLightboxIndex - 1 + currentPhotoList.length) % currentPhotoList.length;
      updateLightboxContent();
      exitZoom();
    });
    lightboxNext.addEventListener('click', function() {
      currentLightboxIndex = (currentLightboxIndex + 1) % currentPhotoList.length;
      updateLightboxContent();
      exitZoom();
    });
    lightbox.addEventListener('click', function(e) { if (e.target === lightbox) closeLightbox(); });

    lightboxInfoBtn.addEventListener('click', function() {
      var showing = lightboxInfo.style.display !== 'none';
      lightboxInfo.style.display = showing ? 'none' : '';
      lightboxInfoBtn.classList.toggle('active', !showing);
    });

    lightboxZoomBtn.addEventListener('click', function() {
      if (isZoomMode) exitZoom(); else enterZoom();
    });
    function enterZoom() {
      isZoomMode = true;
      zoomLevel = 2;
      panX = 0; panY = 0;
      lightboxImgWrap.classList.add('zoom-active');
      lightboxZoomBtn.classList.add('active');
      applyZoomTransform();
    }
    function exitZoom() {
      isZoomMode = false;
      zoomLevel = 1;
      panX = 0; panY = 0;
      lightboxImgWrap.classList.remove('zoom-active');
      lightboxZoomBtn.classList.remove('active');
      lightboxImg.style.transform = '';
    }
    function applyZoomTransform() {
      lightboxImg.style.transform = 'scale(' + zoomLevel + ') translate(' + panX + 'px, ' + panY + 'px)';
    }
    lightboxImgWrap.addEventListener('mousedown', function(e) {
      if (!isZoomMode) return;
      isPanning = true;
      panStartX = e.clientX - panX * zoomLevel;
      panStartY = e.clientY - panY * zoomLevel;
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!isPanning || !isZoomMode) return;
      panX = (e.clientX - panStartX) / zoomLevel;
      panY = (e.clientY - panStartY) / zoomLevel;
      applyZoomTransform();
    });
    document.addEventListener('mouseup', function() { isPanning = false; });
    lightboxImgWrap.addEventListener('wheel', function(e) {
      if (!isZoomMode) return;
      e.preventDefault();
      zoomLevel = Math.min(6, Math.max(1, zoomLevel + (e.deltaY > 0 ? -0.3 : 0.3)));
      if (zoomLevel <= 1) { panX = 0; panY = 0; }
      applyZoomTransform();
    }, { passive: false });

    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') lightboxPrev.click();
      else if (e.key === 'ArrowRight') lightboxNext.click();
    });

    gallerySortSelect.addEventListener('change', function(e) {
      currentSortType = e.target.value;
      renderGallery();
    });

    setActiveNav();

    // Load photos from server data file with localStorage fallback
    fetch('/.netlify/functions/load-photos')
      .then(response => response.json())
      .then(data => {
        if (data.success && data.photos.length > 0) {
          photos = data.photos.map(function(photo) {
            return { 
              src: photo.image, 
              name: photo.title || photo.name || photo.src.split('/').pop(),
              category: photo.category || 'all',
              description: photo.description || ''
            };
          });
          renderGallery();
        } else {
          // Fallback to localStorage
          const galleryPhotos = JSON.parse(localStorage.getItem('galleryPhotos') || '[]');
          photos = galleryPhotos.map(function(photo) {
            return { 
              src: photo.image, 
              name: photo.title || photo.name || photo.src.split('/').pop(),
              category: photo.category || 'all',
              description: photo.description || ''
            };
          });
          renderGallery();
        }
      })
      .catch(function() {
        // Fallback to localStorage
        const galleryPhotos = JSON.parse(localStorage.getItem('galleryPhotos') || '[]');
        photos = galleryPhotos.map(function(photo) {
          return { 
            src: photo.image, 
            name: photo.title || photo.name || photo.src.split('/').pop(),
            category: photo.category || 'all',
            description: photo.description || ''
          };
        });
        renderGallery();
      });
  </script>
</body>
</html>
