<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=5">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body>
  <div class="top-loader" id="topLoader"></div>

  <nav class="nav glass">
    <div class="nav-container">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn" href="gallery.html">Gallery</a>
      <a class="nav-btn" href="albums.html">Albums</a>
      <a class="nav-btn" href="portfolio.html">Portfolio</a>
    </div>
  </nav>

  <main class="container page-main">
    <section id="gallery">
      <div class="section-header">
        <h2>Gallery</h2>
      </div>

      <div class="filter-controls">
        <label for="gallerySortSelect">Sort by:</label>
        <select id="gallerySortSelect">
          <option value="saved">Gallery order</option>
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="nameAsc">A to Z</option>
          <option value="nameDesc">Z to A</option>
        </select>
      </div>

      <div class="gallery-grid" id="galleryGrid"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">📸</div>
        <div class="empty-state-text">No photos yet</div>
        <div class="empty-state-hint">Ask your friend to upload photos in Admin</div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
    <button type="button" class="lightbox-close" id="lightboxClose" aria-label="Close">×</button>
    <button type="button" class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous">‹</button>
    <button type="button" class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next">›</button>

    <div class="lightbox-stage">
      <div class="lightbox-body">
        <div class="lightbox-img-wrap" id="lightboxImgWrap">
          <img id="lightboxImg" src="" alt="">
        </div>
        <aside class="lightbox-info" id="lightboxInfo" aria-label="Photo details">
          <div class="lightbox-info-row"><span class="lightbox-info-label">Filename</span><span class="lightbox-info-val" id="lbInfoName">—</span></div>
          <div class="lightbox-info-row"><span class="lightbox-info-label">Resolution</span><span class="lightbox-info-val" id="lbInfoRes">—</span></div>
          <div class="lightbox-info-row"><span class="lightbox-info-label">Aspect Ratio</span><span class="lightbox-info-val" id="lbInfoAspect">—</span></div>
          <div class="lightbox-info-row"><span class="lightbox-info-label">Date</span><span class="lightbox-info-val" id="lbInfoDate">—</span></div>
          <div class="lightbox-info-row"><span class="lightbox-info-label">Format</span><span class="lightbox-info-val" id="lbInfoFormat">—</span></div>
        </aside>
      </div>
    </div>

    <div class="lightbox-toolbar" role="toolbar" aria-label="Photo actions">
      <button type="button" class="lightbox-tool lightbox-info-btn" id="lightboxInfoBtn" title="Photo info">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        <span>Info</span>
      </button>
      <a class="lightbox-tool lightbox-tool--accent lightbox-download-btn" id="lightboxDownloadBtn" href="#" download>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        <span>Download</span>
      </a>
      <button type="button" class="lightbox-tool lightbox-zoom-btn" id="lightboxZoomBtn" title="Zoom">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M11 8v6M8 11h6"/></svg>
        <span>Zoom</span>
      </button>
    </div>
  </div>

  <script src="common.js?v=3"></script>
  <script>
    var topLoader = document.getElementById('topLoader');
    function showLoader() { topLoader.classList.add('active'); }
    function hideLoader() { topLoader.classList.remove('active'); }

    let photos = [];
    let currentSortType = 'saved';
    let currentLightboxIndex = 0;
    let currentPhotoList = [];

    // --- Zoom / Magnifier ---
    let isZoomMode = false;
    let zoomLevel = 1;
    let panX = 0, panY = 0, isPanning = false, panStartX = 0, panStartY = 0;

    const galleryGrid = document.getElementById('galleryGrid');
    const emptyState = document.getElementById('emptyState');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxImgWrap = document.getElementById('lightboxImgWrap');
    const lightboxClose = document.getElementById('lightboxClose');
    const lightboxPrev = document.getElementById('lightboxPrev');
    const lightboxNext = document.getElementById('lightboxNext');
    const lightboxInfoBtn = document.getElementById('lightboxInfoBtn');
    const lightboxInfo = document.getElementById('lightboxInfo');
    const lightboxZoomBtn = document.getElementById('lightboxZoomBtn');
    const lightboxDownloadBtn = document.getElementById('lightboxDownloadBtn');
    const gallerySortSelect = document.getElementById('gallerySortSelect');

    function safeFilename(photo) {
      const base = (photo && photo.name) ? photo.name : 'photo';
      const cleaned = String(base).trim().replace(/[\\/:*?"<>|]+/g, '-');
      return cleaned || 'photo';
    }

    function detectFormat(photo) {
      const src = (photo && photo.src) ? String(photo.src) : '';
      if (!src) return '—';
      const m = src.match(/\.([a-zA-Z0-9]+)(\?.*)?$/);
      if (m && m[1]) return String(m[1]).toUpperCase();
      return '—';
    }

    let lastGallerySig = '';

    async function renderGallery(options = {}) {
      const silent = !!options.silent;
      if (!silent) showLoader();
      const loaded = await loadStaticGalleryPhotos();
      const sig = JSON.stringify(loaded || []);
      if (silent && sig === lastGallerySig) {
        if (!silent) hideLoader();
        return;
      }
      lastGallerySig = sig;
      photos = loaded || [];
      const filteredPhotos = sortPhotos(photos, currentSortType);

      if (filteredPhotos.length === 0) {
        galleryGrid.style.display = 'none';
        emptyState.style.display = 'block';
        hideLoader();
        return;
      }

      galleryGrid.style.display = 'grid';
      emptyState.style.display = 'none';

      galleryGrid.innerHTML = filteredPhotos.map((photo, index) => {
        const truncName = (photo.name || 'Untitled').length > 28
          ? (photo.name || 'Untitled').substring(0, 28) + '…'
          : (photo.name || 'Untitled');

        return `
          <div class="gallery-item" style="animation-delay: ${Math.min(index * 0.03, 0.6)}s" data-index="${index}">
            <img src="${photo.src}" alt="${photo.name || ''}" loading="lazy">
            <div class="gallery-item-name">${truncName}</div>
          </div>`;
      }).join('');

      document.querySelectorAll('.gallery-item').forEach(item => {
        item.addEventListener('click', () => {
          const index = parseInt(item.dataset.index, 10);
          openLightbox(index, filteredPhotos);
        });
      });

      currentPhotoList = filteredPhotos;
      hideLoader();
    }

    function setInfoPanelOpen(open) {
      lightboxInfo.classList.toggle('is-visible', open);
      lightboxInfoBtn.classList.toggle('active', open);
    }

    function openLightbox(index, photoList) {
      currentLightboxIndex = index;
      currentPhotoList = photoList;
      updateLightboxContent();
      setInfoPanelOpen(false);
      lightbox.classList.add('active');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      exitZoom();
    }

    function updateLightboxContent() {
      var photo = currentPhotoList[currentLightboxIndex];
      if (!photo) return;

      lightboxImg.src = photo.src;

      const fmt = detectFormat(photo);
      lightboxDownloadBtn.setAttribute('download', `${safeFilename(photo)}${fmt !== '—' ? '.' + fmt.toLowerCase() : ''}`);
      lightboxDownloadBtn.onclick = function(e) {
        e.preventDefault();
        fetch(photo.src)
          .then(function(response) {
            if (!response.ok) throw new Error('Failed to fetch image');
            return response.blob();
          })
          .then(function(blob) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${safeFilename(photo)}${fmt !== '—' ? '.' + fmt.toLowerCase() : ''}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          })
          .catch(function(err) {
            console.error('Download failed:', err);
            alert('Failed to download image. Please try again.');
          });
      };

      // Info panel
      document.getElementById('lbInfoName').textContent = photo.name || 'Untitled';
      document.getElementById('lbInfoFormat').textContent = detectFormat(photo);
      var dateEl = document.getElementById('lbInfoDate');
      if (dateEl) {
        dateEl.textContent = photo.date ? new Date(photo.date).toLocaleDateString() : '—';
      }

      // Resolution & aspect ratio (need image load)
      const tmpImg = new Image();
      tmpImg.onload = () => {
        const w = tmpImg.naturalWidth, h = tmpImg.naturalHeight;
        document.getElementById('lbInfoRes').textContent = `${w} × ${h}`;
        const g = gcd(w, h);
        document.getElementById('lbInfoAspect').textContent = `${w/g}:${h/g}`;
      };
      tmpImg.src = photo.src;
    }

    function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

    function closeLightbox() {
      lightbox.classList.remove('active');
      lightbox.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      setInfoPanelOpen(false);
      exitZoom();
    }

    // --- Lightbox Controls ---
    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', function() {
      currentLightboxIndex = (currentLightboxIndex - 1 + currentPhotoList.length) % currentPhotoList.length;
      updateLightboxContent();
      exitZoom();
    });
    lightboxNext.addEventListener('click', function() {
      currentLightboxIndex = (currentLightboxIndex + 1) % currentPhotoList.length;
      updateLightboxContent();
      exitZoom();
    });
    document.getElementById('lightboxBackdrop').addEventListener('click', closeLightbox);

    lightboxInfoBtn.addEventListener('click', function() {
      setInfoPanelOpen(!lightboxInfo.classList.contains('is-visible'));
    });

    lightboxZoomBtn.addEventListener('click', function() {
      if (isZoomMode) exitZoom(); else enterZoom();
    });
    function enterZoom() {
      isZoomMode = true;
      zoomLevel = 2;
      panX = 0; panY = 0;
      lightboxImgWrap.classList.add('zoom-active');
      lightboxZoomBtn.classList.add('active');
      applyZoomTransform();
    }
    function exitZoom() {
      isZoomMode = false;
      zoomLevel = 1;
      panX = 0; panY = 0;
      lightboxImgWrap.classList.remove('zoom-active');
      lightboxZoomBtn.classList.remove('active');
      lightboxImg.style.transform = '';
    }
    function applyZoomTransform() {
      lightboxImg.style.transform = 'scale(' + zoomLevel + ') translate(' + panX + 'px, ' + panY + 'px)';
    }
    lightboxImgWrap.addEventListener('mousedown', function(e) {
      if (!isZoomMode) return;
      isPanning = true;
      panStartX = e.clientX - panX * zoomLevel;
      panStartY = e.clientY - panY * zoomLevel;
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!isPanning || !isZoomMode) return;
      panX = (e.clientX - panStartX) / zoomLevel;
      panY = (e.clientY - panStartY) / zoomLevel;
      applyZoomTransform();
    });
    document.addEventListener('mouseup', function() { isPanning = false; });
    lightboxImgWrap.addEventListener('wheel', function(e) {
      if (!isZoomMode) return;
      e.preventDefault();
      zoomLevel = Math.min(6, Math.max(1, zoomLevel + (e.deltaY > 0 ? -0.3 : 0.3)));
      if (zoomLevel <= 1) { panX = 0; panY = 0; }
      applyZoomTransform();
    }, { passive: false });

    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') lightboxPrev.click();
      else if (e.key === 'ArrowRight') lightboxNext.click();
    });

    gallerySortSelect.addEventListener('change', function(e) {
      currentSortType = e.target.value;
      renderGallery();
    });

    setActiveNav();
    renderGallery();
    startLiveContentSync(renderGallery);
  </script>
</body>
</html>
