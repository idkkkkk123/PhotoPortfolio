[build]
  publish = "."

# Secret admin URL → standard /admin/ folder (optional shortcut)
[[redirects]]
  from = "/admin"
  to = "/admin-bbpews098ge8ht4ez4xdeg/"
  status = 302

[[redirects]]
  from = "/admin/"
  to = "/admin-bbpews098ge8ht4ez4xdeg/"
  status = 302

# HTML pages — always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CSS — cache with revalidation
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS — do not pin forever (old bundle caused per-device / stale behavior)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CMS data — always fetch fresh after a deploy
[[headers]]
  for = "/photos/*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Uploaded photos — revalidate so new CMS uploads show everywhere
[[headers]]
  for = "/photos/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Other images
[[headers]]
  for = "/*.{png,jpg,jpeg,gif,svg,webp,ico}"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Fonts — long cache
[[headers]]
  for = "/*.{woff,woff2,ttf,eot}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Default fallback
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
