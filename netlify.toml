[build]
  publish = "."
  functions = "netlify/functions"

# Secret admin URL → standard /admin/ folder (optional shortcut)
[[redirects]]
  from = "/admin"
  to = "/admin-bbpews098ge8ht4ez4xdeg/"
  status = 302

[[redirects]]
  from = "/admin/"
  to = "/admin-bbpews098ge8ht4ez4xdeg/"
  status = 302

# HTML pages — always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CSS — short cache with revalidation
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# JS — do not pin forever (old bundle caused per-device / stale behavior)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CMS data — always fetch fresh after a deploy
[[headers]]
  for = "/photos/*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Uploaded photos — revalidate so new CMS uploads show everywhere
[[headers]]
  for = "/photos/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Other images
[[headers]]
  for = "/*.{png,jpg,jpeg,gif,svg,webp,ico,avif}"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# JSON data
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Default fallback
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

# Netlify Functions headers
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# Environment variables (set these in Netlify dashboard)
# GITHUB_TOKEN = "your_github_personal_access_token"
