[build]
  command = "node scripts/build-data.js"
  publish = "."
  functions = "netlify/functions"

# HTML pages — revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CSS — short cache with revalidation
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# JS — short cache with revalidation
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images — long cache
[[headers]]
  for = "/*.{png,jpg,jpeg,gif,svg,webp,ico,avif}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JSON data
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Default fallback
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

# Redirects for uploaded files
[[redirects]]
  from = "/photos/uploads/*"
  to = "/.netlify/functions/serve-file?path=:splat"
  status = 200

# Netlify Functions headers
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
