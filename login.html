<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Visual Stories</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      padding: 2rem;
    }
    .auth-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      padding: 3rem;
      width: 100%;
      max-width: 420px;
      animation: authCardIn 0.5s ease-out;
    }
    @keyframes authCardIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .auth-card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      text-align: center;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    .auth-card .auth-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border-radius: 12px;
      overflow: hidden;
      border: 1.5px solid #e4e4e7;
    }
    .auth-tab {
      flex: 1;
      padding: 0.7rem;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      background: #fafafa;
      border: none;
      color: #71717a;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: var(--text-primary);
      color: white;
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .auth-field {
      margin-bottom: 1.25rem;
    }
    .auth-field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      margin-bottom: 0.4rem;
    }
    .auth-field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e4e4e7;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      background: #fafafa;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .auth-field input:focus {
      outline: none;
      border-color: var(--text-primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(10,10,10,0.05);
    }
    .auth-submit {
      width: 100%;
      padding: 0.85rem;
      background: var(--text-primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .auth-submit:hover {
      background: #27272a;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .auth-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .auth-error {
      background: #fef2f2;
      color: #dc2626;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      display: none;
      border: 1px solid #fecaca;
    }
    .auth-error.visible { display: block; }
    .auth-success {
      background: #f0fdf4;
      color: #16a34a;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      display: none;
      border: 1px solid #bbf7d0;
    }
    .auth-success.visible { display: block; }
    .auth-home-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-secondary);
      font-size: 0.82rem;
      text-decoration: none;
    }
    .auth-home-link:hover { color: var(--text-primary); }
    @media (max-width: 480px) {
      .auth-card { padding: 2rem 1.5rem; border-radius: 18px; }
      .auth-card h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Visual Stories</h1>
      <p class="auth-subtitle">Your personal photography workspace</p>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Log In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="loginForm">
        <div class="auth-error" id="loginError"></div>
        <div class="auth-field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="auth-submit" id="loginBtn">Log In</button>
      </form>

      <!-- Signup Form -->
      <form class="auth-form" id="signupForm">
        <div class="auth-error" id="signupError"></div>
        <div class="auth-success" id="signupSuccess"></div>
        <div class="auth-field">
          <label for="signupUsername">Username</label>
          <input type="text" id="signupUsername" placeholder="Choose a username" required minlength="3" autocomplete="username">
        </div>
        <div class="auth-field">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="auth-submit" id="signupBtn">Create Account</button>
      </form>

      <a href="index.html" class="auth-home-link">← Back to Home</a>
    </div>
  </div>

  <script src="common.js"></script>
  <script>
    // If already logged in, redirect
    if (isLoggedIn()) {
      window.location.href = 'gallery.html';
    }

    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
      });
    });

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }
    function hideError(id) {
      document.getElementById(id).classList.remove('visible');
    }
    function showSuccess(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError('loginError');
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        await apiLogin(email, password);
        window.location.href = 'gallery.html';
      } catch (err) {
        showError('loginError', err.message);
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    });

    // Signup
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError('signupError');
      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const username = document.getElementById('signupUsername').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        await apiSignup(username, email, password);
        window.location.href = 'gallery.html';
      } catch (err) {
        showError('signupError', err.message);
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
