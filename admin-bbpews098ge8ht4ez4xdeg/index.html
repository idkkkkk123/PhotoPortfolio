<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Photo site admin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", system-ui, -apple-system, sans-serif;
      background: #f4f4f5;
      color: #18181b;
    }
    .admin-gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .admin-gate-card {
      max-width: 420px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .admin-gate-card h1 {
      margin: 0 0 0.75rem;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .admin-gate-card p {
      margin: 0 0 1.25rem;
      color: #52525b;
      line-height: 1.5;
      font-size: 0.95rem;
    }
    .admin-gate-btn {
      display: inline-block;
      width: 100%;
      padding: 0.85rem 1.25rem;
      border: none;
      border-radius: 10px;
      background: #18181b;
      color: #fff;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    .admin-gate-btn:hover { background: #27272a; }
    .admin-gate-error {
      margin-top: 1rem;
      color: #b91c1c;
      font-size: 0.875rem;
      line-height: 1.4;
    }
    .admin-gate-loading {
      margin-top: 1rem;
      color: #71717a;
      font-size: 0.875rem;
    }
    .admin-gate[hidden] { display: none !important; }
  </style>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@3.1.11/dist/decap-cms.js"></script>
</head>
<body>
  <div id="admin-gate" class="admin-gate">
    <div class="admin-gate-card">
      <h1>Photo site admin</h1>
      <p>Log in with your Netlify invite to edit gallery, albums, and portfolio. After login the editor loads here.</p>
      <p id="admin-gate-loading" class="admin-gate-loading">Loading…</p>
      <button type="button" class="admin-gate-btn" id="admin-login-btn" hidden>Log in</button>
      <p id="admin-gate-error" class="admin-gate-error" hidden></p>
    </div>
  </div>

  <script>
    window.CMS_MANUAL_INIT = true;

    (function () {
      const gate = document.getElementById('admin-gate');
      const loginBtn = document.getElementById('admin-login-btn');
      const loadingEl = document.getElementById('admin-gate-loading');
      const errorEl = document.getElementById('admin-gate-error');
      let cmsStarted = false;

      function showError(msg) {
        loadingEl.hidden = true;
        errorEl.hidden = false;
        errorEl.textContent = msg;
        loginBtn.hidden = false;
      }

      function showLoginButton() {
        loadingEl.hidden = true;
        loginBtn.hidden = false;
      }

      function hideGate() {
        gate.hidden = true;
      }

      function startCms() {
        if (cmsStarted) return;
        if (!window.CMS || typeof window.CMS.init !== 'function') {
          showError('Editor failed to load. Disable ad blockers or try another browser, then refresh.');
          return;
        }
        cmsStarted = true;
        hideGate();
        window.CMS.init();
      }

      function setupIdentity() {
        const identity = window.netlifyIdentity;
        if (!identity) {
          showError('Netlify Identity is not available. In Netlify: Site settings → Identity → Enable Identity, then refresh.');
          return;
        }

        identity.on('init', function (user) {
          if (user) {
            startCms();
          } else {
            showLoginButton();
            identity.open('login');
          }
        });

        identity.on('login', function () {
          startCms();
        });

        identity.on('logout', function () {
          window.location.reload();
        });

        loginBtn.addEventListener('click', function () {
          identity.open('login');
        });

        identity.init();
      }

      if (!window.CMS) {
        showError('Editor script did not load. Check your internet connection and refresh.');
      } else {
        setupIdentity();
      }
    })();
  </script>
</body>
</html>
