<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav glass">
    <div class="nav-container">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn" href="gallery.html">Gallery</a>
      <a class="nav-btn active" href="upload.html">Upload</a>
      <a class="nav-btn" href="display.html">Display</a>
      <a class="nav-btn" href="albums.html">Albums</a>
      <a class="nav-btn" href="../portfolio.html">Portfolio</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container page-main">
    <!-- Upload Section -->
    <section id="upload">
      <div class="section-header">
        <h2>Upload Photos</h2>
      </div>

      <div class="upload-area glass" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*" multiple>
        <div class="upload-icon">📷</div>
        <div class="upload-text">Click or drag to upload photos</div>
        <div class="upload-hint">Select multiple files at once</div>
      </div>

      <!-- Preview Carousel -->
      <div class="preview-carousel glass" id="previewCarousel" style="display:none;">
        <div class="preview-toolbar">
          <span class="preview-counter" id="previewCounter">1 / 1</span>
          <div class="preview-toolbar-btns">
            <div class="fit-toggle" id="fitToggle">
              <button class="fit-toggle-btn active" data-fit="contain" type="button">Contain</button>
              <button class="fit-toggle-btn" data-fit="cover" type="button">Cover</button>
            </div>
            <button id="clearCurrent" class="btn-action" type="button">Clear This</button>
            <button id="saveAllToGallery" class="btn-action btn-action-primary" type="button">Save All to Gallery</button>
          </div>
        </div>
        <div class="preview-viewport" id="previewViewport">
          <button class="preview-nav preview-nav-prev" id="prevBtn" type="button">&#8249;</button>
          <div class="preview-track" id="previewTrack"></div>
          <button class="preview-nav preview-nav-next" id="nextBtn" type="button">&#8250;</button>
        </div>
        <div class="preview-dots" id="previewDots"></div>
      </div>
    </section>

    <!-- Gallery Section -->
    <section id="recent" style="margin-top: 4rem;">
      <div class="section-header">
        <h2>Recent Photos</h2>
      </div>
      <div class="filter-controls">
        <label for="recentSortSelect">Sort by:</label>
        <select id="recentSortSelect">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="sizeDesc">Largest File</option>
          <option value="sizeAsc">Smallest File</option>
          <option value="nameAsc">A to Z</option>
          <option value="nameDesc">Z to A</option>
        </select>
      </div>
      <div class="gallery-grid" id="recentGrid"></div>
      <div class="empty-state" id="recentEmpty">
        <div class="empty-state-icon">🖼️</div>
        <div class="empty-state-text">Nothing saved yet</div>
        <div class="empty-state-hint">Upload and click "Save All to Gallery"</div>
      </div>
    </section>
  </main>

  <script src="common.js"></script>
  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fitToggle = document.getElementById('fitToggle');
    const previewCarousel = document.getElementById('previewCarousel');
    const previewTrack = document.getElementById('previewTrack');
    const previewDots = document.getElementById('previewDots');
    const previewCounter = document.getElementById('previewCounter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const clearCurrentBtn = document.getElementById('clearCurrent');
    const saveAllBtn = document.getElementById('saveAllToGallery');
    const recentGrid = document.getElementById('recentGrid');
    const recentEmpty = document.getElementById('recentEmpty');
    const recentSortSelect = document.getElementById('recentSortSelect');

    let uploads = []; // { dataUrl, name, size, fitMode }
    let currentIndex = 0;
    let currentSortType = 'newest';

    // --- Swipe state ---
    let swipeStartX = 0, swipeStartY = 0, swiping = false, swipeDx = 0;

    // --- Add files to upload queue ---
    async function addFiles(fileList) {
      const startIdx = uploads.length;
      for (const file of fileList) {
        if (file.type.startsWith('image/')) {
          const dataUrl = await fileToDataURL(file);
          uploads.push({ dataUrl, name: file.name, size: file.size, fitMode: 'contain' });
        }
      }
      if (uploads.length > 0) {
        currentIndex = startIdx < uploads.length ? startIdx : uploads.length - 1;
        renderCarousel();
      }
    }

    // --- Render carousel ---
    function renderCarousel() {
      if (uploads.length === 0) {
        previewCarousel.style.display = 'none';
        return;
      }
      previewCarousel.style.display = 'block';

      // Build slides
      previewTrack.innerHTML = '';
      uploads.forEach((u, i) => {
        const slide = document.createElement('div');
        slide.className = 'preview-slide' + (i === currentIndex ? ' active' : '');
        const img = document.createElement('img');
        img.src = u.dataUrl;
        img.alt = u.name;
        img.style.objectFit = u.fitMode || 'contain';
        slide.appendChild(img);
        previewTrack.appendChild(slide);
      });

      // Position track
      updateTrackPosition(0);

      // Counter
      previewCounter.textContent = `${currentIndex + 1} / ${uploads.length}`;

      // Update fit toggle state
      const currentFit = uploads[currentIndex].fitMode || 'contain';
      fitToggle.querySelectorAll('.fit-toggle-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.fit === currentFit);
      });

      // Nav buttons
      prevBtn.style.visibility = currentIndex > 0 ? 'visible' : 'hidden';
      nextBtn.style.visibility = currentIndex < uploads.length - 1 ? 'visible' : 'hidden';

      // Dots
      previewDots.innerHTML = '';
      uploads.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.className = 'preview-dot' + (i === currentIndex ? ' active' : '');
        dot.addEventListener('click', () => { currentIndex = i; renderCarousel(); });
        previewDots.appendChild(dot);
      });
    }

    function updateTrackPosition(offset) {
      previewTrack.style.transform = `translateX(calc(-${currentIndex * 100}% + ${offset}px))`;
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(uploads.length - 1, index));
      renderCarousel();
    }

    // --- Swipe handling (mouse + touch) ---
    const viewport = document.getElementById('previewViewport');

    function onSwipeStart(x, y) {
      if (uploads.length <= 1) return;
      swiping = true;
      swipeStartX = x;
      swipeStartY = y;
      swipeDx = 0;
      previewTrack.style.transition = 'none';
    }

    function onSwipeMove(x, y) {
      if (!swiping) return;
      swipeDx = x - swipeStartX;
      // Only horizontal swipe
      if (Math.abs(swipeDx) > Math.abs(y - swipeStartY)) {
        updateTrackPosition(swipeDx);
      }
    }

    function onSwipeEnd() {
      if (!swiping) return;
      swiping = false;
      previewTrack.style.transition = 'transform 0.3s ease';
      const threshold = viewport.clientWidth * 0.15;
      if (swipeDx < -threshold && currentIndex < uploads.length - 1) {
        goTo(currentIndex + 1);
      } else if (swipeDx > threshold && currentIndex > 0) {
        goTo(currentIndex - 1);
      } else {
        updateTrackPosition(0);
      }
    }

    // Mouse swipe
    viewport.addEventListener('mousedown', e => {
      if (e.target.closest('.preview-nav')) return;
      onSwipeStart(e.clientX, e.clientY);
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => onSwipeMove(e.clientX, e.clientY));
    document.addEventListener('mouseup', () => onSwipeEnd());

    // Touch swipe
    viewport.addEventListener('touchstart', e => {
      if (e.target.closest('.preview-nav')) return;
      const t = e.touches[0];
      onSwipeStart(t.clientX, t.clientY);
    }, { passive: true });
    viewport.addEventListener('touchmove', e => {
      const t = e.touches[0];
      onSwipeMove(t.clientX, t.clientY);
    }, { passive: true });
    viewport.addEventListener('touchend', () => onSwipeEnd());

    // Nav buttons
    prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
    nextBtn.addEventListener('click', () => goTo(currentIndex + 1));

    // --- Upload area events ---
    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', e => {
      e.preventDefault();
      uploadArea.style.background = 'rgba(0, 0, 0, 0.05)';
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.background = '';
    });
    uploadArea.addEventListener('drop', async e => {
      e.preventDefault();
      uploadArea.style.background = '';
      if (e.dataTransfer.files.length > 0) await addFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', async e => {
      if (e.target.files.length > 0) await addFiles(e.target.files);
      fileInput.value = '';
    });

    // --- Fit toggle (per-photo) ---
    fitToggle.addEventListener('click', e => {
      const btn = e.target.closest('.fit-toggle-btn');
      if (!btn || uploads.length === 0) return;
      uploads[currentIndex].fitMode = btn.dataset.fit;
      renderCarousel();
    });

    // --- Clear current image ---
    clearCurrentBtn.addEventListener('click', () => {
      if (uploads.length === 0) return;
      uploads.splice(currentIndex, 1);
      if (currentIndex >= uploads.length) currentIndex = Math.max(0, uploads.length - 1);
      renderCarousel();
    });

    // --- Save all to gallery ---
    saveAllBtn.addEventListener('click', async () => {
      if (uploads.length === 0) return;
      if (!isLoggedIn()) { window.location.href = 'login.html'; return; }

      saveAllBtn.disabled = true;
      saveAllBtn.textContent = 'Saving...';

      try {
        const photosToSave = uploads.map(u => ({
          id: Date.now().toString() + Math.random().toString(36).substr(2, 9) + Math.random().toString(36).substr(2, 4),
          src: u.dataUrl,
          name: u.name || 'Untitled',
          date: new Date().toISOString(),
          size: u.size,
          fitMode: u.fitMode || 'contain'
        }));

        await savePhotosToServer(photosToSave);
        uploads = [];
        currentIndex = 0;
        renderCarousel();
        await renderRecent();
      } catch (err) {
        alert('Failed to save photos: ' + err.message);
      }

      saveAllBtn.disabled = false;
      saveAllBtn.textContent = 'Save All to Gallery';
    });

    // --- Recent photos ---
    async function renderRecent() {
      let photos = isLoggedIn() ? await loadPhotosAsync() : [];
      photos = sortPhotos(photos, currentSortType);
      const list = photos.slice(0, 12);

      if (list.length === 0) {
        recentGrid.style.display = 'none';
        recentEmpty.style.display = 'block';
        return;
      }

      recentGrid.style.display = 'grid';
      recentEmpty.style.display = 'none';

      recentGrid.innerHTML = list.map((photo, index) => {
        const truncName = (photo.name || 'Untitled').length > 22
          ? (photo.name || 'Untitled').substring(0, 22) + '…'
          : (photo.name || 'Untitled');
        return `
        <div class="gallery-item" style="animation-delay: ${Math.min(index * 0.03, 0.6)}s" data-id="${photo.id}">
          <img src="${photo.src}" alt="${photo.name}" loading="lazy">
          <div class="gallery-item-name">${truncName}</div>
        </div>`;
      }).join('');

      recentGrid.querySelectorAll('.gallery-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = item.dataset.id;
          const photo = loadPhotos().find(p => String(p.id) === id);
          if (!photo) return;
          uploads = [{ dataUrl: photo.src, name: photo.name, size: photo.size || 0, fitMode: photo.fitMode || 'contain' }];
          currentIndex = 0;
          renderCarousel();
        });
      });
    }

    recentSortSelect.addEventListener('change', (e) => {
      currentSortType = e.target.value;
      renderRecent();
    });

    setActiveNav();
    if (isLoggedIn()) {
      document.getElementById('navLoginBtn').style.display = 'none';
      document.getElementById('navLogoutBtn').style.display = '';
    }
    renderRecent();
  </script>
</body>
</html>
