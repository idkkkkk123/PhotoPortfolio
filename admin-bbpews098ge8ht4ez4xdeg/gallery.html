<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin-styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav glass">
        <div class="nav-container">
            <a class="nav-btn" href="index.html">Home</a>
            <a class="nav-btn active" href="gallery.html">Gallery</a>
            <a class="nav-btn" href="upload.html">Upload</a>
            <a class="nav-btn" href="display.html">Display</a>
            <a class="nav-btn" href="albums.html">Albums</a>
            <a class="nav-btn" href="../portfolio.html">Portfolio</a>
        </div>
    </nav>

    <main class="container page-main">
        <section id="gallery">
            <div class="section-header">
                <h2>Gallery Admin</h2>
                <div class="admin-actions">
                    <button id="addPhotoBtn" class="cta-button">Add Photo</button>
                    <button id="deleteSelectedBtn" class="cta-button" style="background: #e74c3c;">Delete Selected</button>
                </div>
            </div>
            
            <!-- Filter Controls -->
            <div class="filter-controls">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="nature">Nature</button>
                <button class="filter-btn" data-filter="portrait">Portrait</button>
                <button class="filter-btn" data-filter="street">Street</button>
                <button class="filter-btn" data-filter="abstract">Abstract</button>
            </div>

            <!-- Gallery Grid -->
            <div class="gallery-grid" id="galleryGrid">
                <!-- Photos will be loaded here -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="galleryEmpty">
                <div class="empty-state-icon">📸</div>
                <div class="empty-state-text">No photos in gallery</div>
                <div class="empty-state-hint">Upload photos to get started</div>
            </div>
        </section>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImage">
            <div class="lightbox-info">
                <h3 id="lightboxTitle"></h3>
                <p id="lightboxDescription"></p>
            </div>
            <button class="lightbox-close" id="lightboxClose">&times;</button>
        </div>
    </div>

    <!-- Add Photo Modal -->
    <div class="modal" id="addPhotoModal">
        <div class="modal-content">
            <h3>Add Photo to Gallery</h3>
            <form id="addPhotoForm">
                <div class="form-group">
                    <label for="photoTitle">Title:</label>
                    <input type="text" id="photoTitle" required>
                </div>
                <div class="form-group">
                    <label for="photoCategory">Category:</label>
                    <select id="photoCategory">
                        <option value="nature">Nature</option>
                        <option value="portrait">Portrait</option>
                        <option value="street">Street</option>
                        <option value="abstract">Abstract</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="photoDescription">Description:</label>
                    <textarea id="photoDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="photoImage">Image:</label>
                    <input type="file" id="photoImage" accept="image/*" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="cta-button">Add Photo</button>
                    <button type="button" class="cta-button" id="cancelAddPhoto">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../common.js"></script>
    <script>
        // Admin Gallery Management
        document.addEventListener('DOMContentLoaded', () => {
            setActiveNav();
            loadGalleryPhotos();
            setupEventListeners();
        });

        function setupEventListeners() {
            // Add photo button
            document.getElementById('addPhotoBtn').addEventListener('click', () => {
                document.getElementById('addPhotoModal').style.display = 'block';
            });

            // Cancel add photo
            document.getElementById('cancelAddPhoto').addEventListener('click', () => {
                document.getElementById('addPhotoModal').style.display = 'none';
            });

            // Add photo form
            document.getElementById('addPhotoForm').addEventListener('submit', (e) => {
                e.preventDefault();
                addPhotoToGallery();
            });

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterGallery(btn.dataset.filter);
                });
            });

            // Lightbox
            document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
            document.getElementById('lightbox').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeLightbox();
            });
        }

        function loadGalleryPhotos() {
            // Load photos from localStorage or API
            const photos = JSON.parse(localStorage.getItem('galleryPhotos') || '[]');
            renderGallery(photos);
        }

        function renderGallery(photos) {
            const grid = document.getElementById('galleryGrid');
            const emptyState = document.getElementById('galleryEmpty');
            
            if (photos.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            grid.innerHTML = photos.map((photo, index) => `
                <div class="gallery-item" data-category="${photo.category}" data-index="${index}">
                    <div class="gallery-item-checkbox">
                        <input type="checkbox" class="photo-select" data-index="${index}">
                    </div>
                    <img src="${photo.image}" alt="${photo.title}" loading="lazy">
                    <div class="gallery-item-info">
                        <h3>${photo.title}</h3>
                        <p>${photo.description || ''}</p>
                    </div>
                    <button class="gallery-item-delete" onclick="deletePhoto(${index})">&times;</button>
                </div>
            `).join('');
        }

        function addPhotoToGallery() {
            const title = document.getElementById('photoTitle').value;
            const category = document.getElementById('photoCategory').value;
            const description = document.getElementById('photoDescription').value;
            const fileInput = document.getElementById('photoImage');
            
            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const photos = JSON.parse(localStorage.getItem('galleryPhotos') || '[]');
                    photos.push({
                        title,
                        category,
                        description,
                        image: e.target.result
                    });
                    localStorage.setItem('galleryPhotos', JSON.stringify(photos));
                    
                    // Reset form and close modal
                    document.getElementById('addPhotoForm').reset();
                    document.getElementById('addPhotoModal').style.display = 'none';
                    
                    // Reload gallery
                    loadGalleryPhotos();
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        function deletePhoto(index) {
            if (confirm('Are you sure you want to delete this photo?')) {
                const photos = JSON.parse(localStorage.getItem('galleryPhotos') || '[]');
                photos.splice(index, 1);
                localStorage.setItem('galleryPhotos', JSON.stringify(photos));
                loadGalleryPhotos();
            }
        }

        function filterGallery(category) {
            const items = document.querySelectorAll('.gallery-item');
            items.forEach(item => {
                if (category === 'all' || item.dataset.category === category) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>
</body>
</html>
