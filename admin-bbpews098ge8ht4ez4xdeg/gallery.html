<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css?v=3">
  <link rel="stylesheet" href="admin-styles.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="/identity-invite.js"></script>
  <script src="admin-api.js?v=3"></script>
  <script src="admin-auth.js?v=2"></script>
  <script src="admin-chrome.js"></script>
</head>
<body>
  <div class="top-loader" id="topLoader"></div>

  <nav class="nav glass">
    <div class="nav-container">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn" href="upload.html">Upload</a>
      <a class="nav-btn active" href="gallery.html">Gallery</a>
      <a class="nav-btn" href="display.html">Display</a>
      <a class="nav-btn" href="albums.html">Albums</a>
      <a class="nav-btn" href="../gallery.html">View site</a>
    </div>
  </nav>

  <main class="container page-main">
    <section id="gallery">
      <div class="section-header">
        <h2>Gallery</h2>
        <div class="admin-actions">
          <button type="button" id="saveOrderBtn" class="cta-button" disabled>Save order</button>
          <button type="button" id="deleteSelectedBtn" class="cta-button admin-btn-danger">Delete selected</button>
        </div>
      </div>
      <p class="admin-gallery-hint">Photos appear here after you upload them on the <a href="upload.html">Upload</a> tab. Drag to reorder, or use the arrows — then click <strong>Save order</strong>. The public gallery uses this order.</p>
      <div class="gallery-grid admin-gallery-grid" id="galleryGrid"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">📸</div>
        <div class="empty-state-text">No photos yet</div>
        <div class="empty-state-hint"><a href="upload.html">Upload photos</a> first, then manage them here.</div>
      </div>
      <p class="admin-save-status" id="saveStatus" hidden></p>
    </section>
  </main>

  <script src="../common.js?v=3"></script>
  <script>
    var topLoader = document.getElementById('topLoader');
    function showLoader() { topLoader.classList.add('active'); }
    function hideLoader() { topLoader.classList.remove('active'); }

    var photos = [];
    var orderDirty = false;
    var dragFromIndex = null;

    var galleryGrid = document.getElementById('galleryGrid');
    var emptyState = document.getElementById('emptyState');
    var saveOrderBtn = document.getElementById('saveOrderBtn');
    var saveStatus = document.getElementById('saveStatus');

    function photoSrc(photo) {
      if (typeof resolveMediaUrl === 'function') {
        return resolveMediaUrl(photo.src, photo);
      }
      var s = photo.src || '';
      if (s.startsWith('/')) return s;
      return s;
    }

    function setOrderDirty(dirty) {
      orderDirty = dirty;
      saveOrderBtn.disabled = !dirty;
    }

    function showStatus(msg, isError) {
      saveStatus.hidden = false;
      saveStatus.textContent = msg;
      saveStatus.className = 'admin-save-status' + (isError ? ' admin-save-status-error' : '');
    }

    function renderGallery() {
      showLoader();
      if (photos.length === 0) {
        galleryGrid.style.display = 'none';
        emptyState.style.display = 'block';
        hideLoader();
        return;
      }
      galleryGrid.style.display = 'grid';
      emptyState.style.display = 'none';

      galleryGrid.innerHTML = photos.map(function (photo, index) {
        var name = photo.name || 'Untitled';
        return (
          '<div class="gallery-item admin-gallery-item" draggable="true" data-index="' + index + '" data-id="' + photo.id + '">' +
          '<div class="gallery-item-checkbox">' +
          '<input type="checkbox" class="photo-select" data-id="' + photo.id + '">' +
          '</div>' +
          '<div class="admin-gallery-moves">' +
          '<button type="button" class="admin-move-btn" data-dir="-1" title="Move left" aria-label="Move left">‹</button>' +
          '<button type="button" class="admin-move-btn" data-dir="1" title="Move right" aria-label="Move right">›</button>' +
          '</div>' +
          '<span class="admin-drag-handle" title="Drag to reorder">⋮⋮</span>' +
          '<img src="' + photoSrc(photo) + '" alt="' + name.replace(/"/g, '&quot;') + '" loading="lazy">' +
          '<div class="gallery-item-name">' + name + '</div>' +
          '</div>'
        );
      }).join('');

      galleryGrid.querySelectorAll('.admin-gallery-item').forEach(function (item) {
        item.addEventListener('dragstart', onDragStart);
        item.addEventListener('dragover', onDragOver);
        item.addEventListener('drop', onDrop);
        item.addEventListener('dragend', function () {
          item.classList.remove('admin-drag-over');
        });
      });

      galleryGrid.querySelectorAll('.admin-move-btn').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          var item = btn.closest('.admin-gallery-item');
          var index = parseInt(item.dataset.index, 10);
          var dir = parseInt(btn.dataset.dir, 10);
          movePhoto(index, index + dir);
        });
      });

      hideLoader();
    }

    function movePhoto(from, to) {
      if (to < 0 || to >= photos.length || from === to) return;
      var item = photos.splice(from, 1)[0];
      photos.splice(to, 0, item);
      setOrderDirty(true);
      renderGallery();
    }

    function onDragStart(e) {
      var item = e.target.closest('.admin-gallery-item');
      if (!item) return;
      dragFromIndex = parseInt(item.dataset.index, 10);
      e.dataTransfer.effectAllowed = 'move';
      item.classList.add('admin-dragging');
    }

    function onDragOver(e) {
      e.preventDefault();
      var item = e.target.closest('.admin-gallery-item');
      if (item) item.classList.add('admin-drag-over');
    }

    function onDrop(e) {
      e.preventDefault();
      var item = e.target.closest('.admin-gallery-item');
      if (!item || dragFromIndex === null) return;
      var toIndex = parseInt(item.dataset.index, 10);
      galleryGrid.querySelectorAll('.admin-gallery-item').forEach(function (el) {
        el.classList.remove('admin-drag-over', 'admin-dragging');
      });
      movePhoto(dragFromIndex, toIndex);
      dragFromIndex = null;
    }

    document.getElementById('deleteSelectedBtn').addEventListener('click', function () {
      var selected = document.querySelectorAll('.photo-select:checked');
      if (selected.length === 0) {
        alert('Select one or more photos to delete.');
        return;
      }
      if (!confirm('Delete ' + selected.length + ' photo(s) from the live gallery?')) return;

      var idsToDelete = Array.from(selected).map(function (cb) {
        return String(cb.dataset.id);
      });
      photos = photos.filter(function (p) {
        return idsToDelete.indexOf(String(p.id)) === -1;
      });

      showLoader();
      AdminAPI.saveGallery(photos)
        .then(function () {
          setOrderDirty(false);
          showStatus('Deleted. Public gallery updates in about a minute.');
          renderGallery();
        })
        .catch(function (error) {
          alert('Failed to delete: ' + error.message);
        })
        .finally(hideLoader);
    });

    saveOrderBtn.addEventListener('click', function () {
      showLoader();
      saveOrderBtn.disabled = true;
      AdminAPI.saveGallery(photos)
        .then(function () {
          setOrderDirty(false);
          showStatus('Order saved. Visitors will see this order on the main gallery.');
        })
        .catch(function (error) {
          alert('Failed to save order: ' + error.message);
          setOrderDirty(true);
        })
        .finally(hideLoader);
    });

    function loadGalleryFromServer() {
      showLoader();
      AdminAPI.loadGallery()
        .then(function (loaded) {
          photos = loaded;
          setOrderDirty(false);
          if (typeof setActiveNav === 'function') setActiveNav();
          renderGallery();
        })
        .catch(function (error) {
          console.error('Error loading gallery:', error);
          photos = [];
          renderGallery();
          showStatus('Could not load gallery: ' + error.message, true);
        })
        .finally(hideLoader);
    }

    window.addEventListener('admin-auth-ready', loadGalleryFromServer);
  </script>
</body>
</html>
