<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="admin-styles.css">
</head>
<body>
  <div class="top-loader" id="topLoader"></div>

  <nav class="nav glass">
    <div class="nav-container">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn active" href="gallery.html">Gallery</a>
      <a class="nav-btn" href="upload.html">Upload</a>
      <a class="nav-btn" href="display.html">Display</a>
      <a class="nav-btn" href="albums.html">Albums</a>
      <a class="nav-btn" href="../portfolio.html">Portfolio</a>
    </div>
  </nav>

  <main class="container page-main">
    <section id="gallery">
      <div class="section-header">
        <h2>Gallery</h2>
        <div class="admin-actions">
          <button id="addPhotoBtn" class="cta-button">Add Photo</button>
          <button id="deleteSelectedBtn" class="cta-button" style="background: #e74c3c;">Delete Selected</button>
        </div>
      </div>
      <div class="filter-controls">
        <label for="gallerySortSelect">Sort by:</label>
        <select id="gallerySortSelect">
          <option value="nameAsc">A to Z</option>
          <option value="nameDesc">Z to A</option>
        </select>
      </div>
      <div class="gallery-grid" id="galleryGrid"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">📸</div>
        <div class="empty-state-text">No photos yet</div>
        <div class="empty-state-hint">Admin can add photos through upload panel</div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">×</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">›</button>
    <div class="lightbox-body">
      <div class="lightbox-img-wrap" id="lightboxImgWrap">
        <img id="lightboxImg" src="" alt="">
      </div>
      <div class="lightbox-info" id="lightboxInfo" style="display:none;">
        <div class="lightbox-info-row"><span class="lightbox-info-label">Filename</span><span class="lightbox-info-val" id="lbInfoName">—</span></div>
        <div class="lightbox-info-row"><span class="lightbox-info-label">Resolution</span><span class="lightbox-info-val" id="lbInfoRes">—</span></div>
        <div class="lightbox-info-row"><span class="lightbox-info-label">Aspect Ratio</span><span class="lightbox-info-val" id="lbInfoAspect">—</span></div>
        <div class="lightbox-info-row"><span class="lightbox-info-label">Format</span><span class="lightbox-info-val" id="lbInfoFormat">—</span></div>
      </div>
    </div>
    <button class="lightbox-info-btn" id="lightboxInfoBtn" title="Toggle Info">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
    </button>
    <button class="lightbox-zoom-btn" id="lightboxZoomBtn" title="Toggle Zoom">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M11 8v6M8 11h6"/></svg>
    </button>
  </div>

  <!-- Add Photo Modal -->
  <div class="modal" id="addPhotoModal">
    <div class="modal-content">
      <h3>Add Photo to Gallery</h3>
      <form id="addPhotoForm">
        <div class="form-group">
          <label for="photoTitle">Title:</label>
          <input type="text" id="photoTitle" required>
        </div>
        <div class="form-group">
          <label for="photoCategory">Category:</label>
          <select id="photoCategory">
            <option value="all">All</option>
            <option value="nature">Nature</option>
            <option value="portrait">Portrait</option>
            <option value="street">Street</option>
            <option value="abstract">Abstract</option>
          </select>
        </div>
        <div class="form-group">
          <label for="photoDescription">Description:</label>
          <textarea id="photoDescription" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="photoImage">Image:</label>
          <input type="file" id="photoImage" accept="image/*" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="cta-button">Add Photo</button>
          <button type="button" class="cta-button" id="cancelAddPhoto">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../common.js"></script>
  <script>
    var topLoader = document.getElementById('topLoader');
    function showLoader() { topLoader.classList.add('active'); }
    function hideLoader() { topLoader.classList.remove('active'); }

    var photos = [];
    var currentSortType = 'nameAsc';
    var currentLightboxIndex = 0;
    var currentPhotoList = [];
    var isZoomMode = false;
    var zoomLevel = 1;
    var panX = 0, panY = 0, isPanning = false, panStartX = 0, panStartY = 0;

    var galleryGrid = document.getElementById('galleryGrid');
    var emptyState = document.getElementById('emptyState');
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightboxImg');
    var lightboxImgWrap = document.getElementById('lightboxImgWrap');
    var lightboxClose = document.getElementById('lightboxClose');
    var lightboxPrev = document.getElementById('lightboxPrev');
    var lightboxNext = document.getElementById('lightboxNext');
    var lightboxInfoBtn = document.getElementById('lightboxInfoBtn');
    var lightboxInfo = document.getElementById('lightboxInfo');
    var lightboxZoomBtn = document.getElementById('lightboxZoomBtn');
    var gallerySortSelect = document.getElementById('gallerySortSelect');

    function renderGallery() {
      showLoader();
      var filteredPhotos = sortPhotos(photos, currentSortType);

      if (filteredPhotos.length === 0) {
        galleryGrid.style.display = 'none';
        emptyState.style.display = 'block';
        hideLoader();
        return;
      }
      galleryGrid.style.display = 'grid';
      emptyState.style.display = 'none';

      galleryGrid.innerHTML = filteredPhotos.map(function(photo, index) {
        return `
        <div class="gallery-item" style="animation-delay: ${Math.min(index * 0.03, 0.6)}s" data-id="${photo.id}">
          <div class="gallery-item-checkbox">
            <input type="checkbox" class="photo-select" data-id="${photo.id}">
          </div>
          <img src="${photo.src}" alt="${photo.name}" loading="lazy">
          <div class="gallery-item-name">${photo.name}</div>
        </div>`;
      }).join('');

      galleryGrid.querySelectorAll('.gallery-item').forEach(function(item) {
        item.addEventListener('click', function(e) {
          if (!e.target.closest('.gallery-item-checkbox')) {
            openLightbox(photos.find(function(p) { return String(p.id) === item.dataset.id; }));
          }
        });
      });
      hideLoader();
    }

    function sortPhotos(photos, type) {
      var sorted = photos.slice();
      switch (type) {
        case 'nameAsc':
          sorted.sort(function(a, b) { return a.name.localeCompare(b.name); });
          break;
        case 'nameDesc':
          sorted.sort(function(a, b) { return b.name.localeCompare(a.name); });
          break;
        default:
          break;
      }
      return sorted;
    }

    function openLightbox(photo) {
      if (!photo) return;
      currentLightboxIndex = currentPhotoList.indexOf(photo);
      lightboxImg.src = photo.src;
      lightbox.classList.add('active');
      updateLightboxInfo(photo);
      document.body.style.overflow = 'hidden';
    }

    function updateLightboxInfo(photo) {
      document.getElementById('lbInfoName').textContent = photo.name || '—';
      document.getElementById('lbInfoRes').textContent = '—';
      document.getElementById('lbInfoAspect').textContent = '—';
      document.getElementById('lbInfoFormat').textContent = (photo.name && photo.name.includes('.')) ? photo.name.split('.').pop().toUpperCase() : '—';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      isZoomMode = false;
      zoomLevel = 1;
      panX = 0;
      panY = 0;
      applyZoomTransform();
    }

    function applyZoomTransform() {
      var scale = isZoomMode ? zoomLevel : 1;
      var translateX = isZoomMode ? panX : 0;
      var translateY = isZoomMode ? panY : 0;
      lightboxImgWrap.style.transform = `scale(${scale}) translate(${translateX}px, ${translateY}px)`;
    }

    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') lightboxPrev.click();
      else if (e.key === 'ArrowRight') lightboxNext.click();
    });

    gallerySortSelect.addEventListener('change', function(e) {
      currentSortType = e.target.value;
      renderGallery();
    });

    // Admin functionality
    document.getElementById('addPhotoBtn').addEventListener('click', () => {
      document.getElementById('addPhotoModal').style.display = 'block';
    });

    document.getElementById('cancelAddPhoto').addEventListener('click', () => {
      document.getElementById('addPhotoModal').style.display = 'none';
    });

    document.getElementById('addPhotoForm').addEventListener('submit', (e) => {
      e.preventDefault();
      addPhotoToGallery();
    });

    document.getElementById('deleteSelectedBtn').addEventListener('click', () => {
      const selected = document.querySelectorAll('.photo-select:checked');
      if (selected.length === 0) {
        alert('Please select photos to delete');
        return;
      }
      
      if (confirm(`Delete ${selected.length} photo(s)?`)) {
        const idsToDelete = Array.from(selected).map(cb => cb.dataset.id);
        photos = photos.filter(p => !idsToDelete.includes(p.id));
        
        // Save to server data file
        fetch('/.netlify/functions/save-photos', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(photos)
        })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            renderGallery();
          } else {
            alert('Failed to delete photos: ' + data.error);
          }
        })
        .catch(error => {
          alert('Failed to delete photos: ' + error.message);
        });
      }
    });

    function addPhotoToGallery() {
      const title = document.getElementById('photoTitle').value;
      const category = document.getElementById('photoCategory').value;
      const description = document.getElementById('photoDescription').value;
      const fileInput = document.getElementById('photoImage');
      
      if (fileInput.files.length > 0) {
        // Create FormData for real file upload
        const formData = new FormData();
        formData.append('files[0]', fileInput.files[0]);
        
        fetch('/.netlify/functions/upload', {
          method: 'POST',
          body: formData
        })
        .then(response => response.json())
        .then(uploadResult => {
          if (uploadResult.success) {
            const newPhoto = {
              id: uploadResult.files[0].id,
              title: title,
              category: category,
              description: description,
              image: uploadResult.files[0].src,
              name: fileInput.files[0].name
            };
            
            photos.push(newPhoto);
            
            // Save to server data file
            fetch('/.netlify/functions/save-photos', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(photos)
            })
            .then(response => response.json())
            .then(data => {
              if (data.success) {
                // Reset form and close modal
                document.getElementById('addPhotoForm').reset();
                document.getElementById('addPhotoModal').style.display = 'none';
                
                renderGallery();
              } else {
                alert('Failed to save photo: ' + data.error);
              }
            })
            .catch(error => {
              alert('Failed to save photo: ' + error.message);
            });
          } else {
            alert('Failed to upload photo: ' + uploadResult.error);
          }
        })
        .catch(error => {
          alert('Failed to upload photo: ' + error.message);
        });
      }
    }

    // Load photos from server data file (shared with admin and viewer)
    fetch('/.netlify/functions/load-photos')
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          photos = data.photos.map(function(photo) {
            return { 
              id: photo.id,
              src: photo.image, 
              name: photo.title || photo.name || photo.src.split('/').pop(),
              category: photo.category || 'all',
              description: photo.description || ''
            };
          });
          currentPhotoList = photos;
        } else {
          photos = [];
          currentPhotoList = [];
        }
        setActiveNav();
        renderGallery();
      })
      .catch(function() {
        photos = [];
        currentPhotoList = [];
        setActiveNav();
        renderGallery();
      });
  </script>
</body>
</html>
