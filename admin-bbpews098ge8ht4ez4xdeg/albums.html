<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albums Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin-styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav glass">
        <div class="nav-container">
            <a class="nav-btn" href="index.html">Home</a>
            <a class="nav-btn" href="gallery.html">Gallery</a>
            <a class="nav-btn" href="upload.html">Upload</a>
            <a class="nav-btn" href="display.html">Display</a>
            <a class="nav-btn active" href="albums.html">Albums</a>
            <a class="nav-btn" href="../portfolio.html">Portfolio</a>
        </div>
    </nav>

    <main class="container page-main">
        <section id="albumsSection">
            <div class="section-header">
                <h2>Albums Admin</h2>
                <div class="admin-actions">
                    <button id="addAlbumBtn" class="cta-button">Add Album</button>
                    <button id="deleteSelectedAlbumsBtn" class="cta-button" style="background: #e74c3c;">Delete Selected</button>
                </div>
            </div>
            
            <div class="album-grid" id="albumGrid">
                <!-- Albums will be loaded here -->
            </div>
            
            <div class="empty-state" id="albumsEmpty">
                <div class="empty-state-icon">📁</div>
                <div class="empty-state-text">No albums yet</div>
                <div class="empty-state-hint">Create your first album to organize your photos</div>
            </div>
        </section>
    </main>

    <!-- Add Album Modal -->
    <div class="modal" id="addAlbumModal">
        <div class="modal-content">
            <h3>Create New Album</h3>
            <form id="addAlbumForm">
                <div class="form-group">
                    <label for="albumName">Album Name:</label>
                    <input type="text" id="albumName" required>
                </div>
                <div class="form-group">
                    <label for="albumDescription">Description:</label>
                    <textarea id="albumDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="albumCover">Cover Image:</label>
                    <input type="file" id="albumCover" accept="image/*">
                </div>
                <div class="form-actions">
                    <button type="submit" class="cta-button">Create Album</button>
                    <button type="button" class="cta-button" id="cancelAddAlbum">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Album Detail Modal -->
    <div class="modal" id="albumDetailModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="albumDetailTitle"></h3>
                <button class="modal-close" id="closeAlbumDetail">&times;</button>
            </div>
            <div class="modal-body">
                <div class="album-detail-actions">
                    <button id="addPhotosToAlbumBtn" class="cta-button">Add Photos</button>
                    <button id="deleteAlbumBtn" class="cta-button" style="background: #e74c3c;">Delete Album</button>
                </div>
                <div class="album-photos-grid" id="albumPhotosGrid">
                    <!-- Album photos will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="../common.js"></script>
    <script>
        // Admin Albums Management
        document.addEventListener('DOMContentLoaded', () => {
            setActiveNav();
            loadAlbums();
            setupEventListeners();
        });

        function setupEventListeners() {
            // Add album button
            document.getElementById('addAlbumBtn').addEventListener('click', () => {
                document.getElementById('addAlbumModal').style.display = 'block';
            });

            // Cancel add album
            document.getElementById('cancelAddAlbum').addEventListener('click', () => {
                document.getElementById('addAlbumModal').style.display = 'none';
            });

            // Add album form
            document.getElementById('addAlbumForm').addEventListener('submit', (e) => {
                e.preventDefault();
                createAlbum();
            });

            // Close album detail
            document.getElementById('closeAlbumDetail').addEventListener('click', () => {
                document.getElementById('albumDetailModal').style.display = 'none';
            });

            // Add photos to album
            document.getElementById('addPhotosToAlbumBtn').addEventListener('click', () => {
                addPhotosToCurrentAlbum();
            });

            // Delete album
            document.getElementById('deleteAlbumBtn').addEventListener('click', () => {
                deleteCurrentAlbum();
            });
        }

        function loadAlbums() {
            const albums = JSON.parse(localStorage.getItem('albums') || '[]');
            renderAlbums(albums);
        }

        function renderAlbums(albums) {
            const grid = document.getElementById('albumGrid');
            const emptyState = document.getElementById('albumsEmpty');
            
            if (albums.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            grid.innerHTML = albums.map((album, index) => `
                <div class="album-item" data-index="${index}">
                    <div class="album-item-checkbox">
                        <input type="checkbox" class="album-select" data-index="${index}">
                    </div>
                    <div class="album-cover" onclick="openAlbumDetail(${index})">
                        <img src="${album.cover || 'https://picsum.photos/seed/album' + index + '/300/200.jpg'}" alt="${album.name}">
                        <div class="album-overlay">
                            <h3>${album.name}</h3>
                            <p>${album.photos ? album.photos.length : 0} photos</p>
                        </div>
                    </div>
                    <div class="album-info">
                        <h4>${album.name}</h4>
                        <p>${album.description || ''}</p>
                    </div>
                    <button class="album-item-delete" onclick="deleteAlbum(${index})">&times;</button>
                </div>
            `).join('');
        }

        function createAlbum() {
            const name = document.getElementById('albumName').value;
            const description = document.getElementById('albumDescription').value;
            const coverInput = document.getElementById('albumCover');
            
            const albums = JSON.parse(localStorage.getItem('albums') || '[]');
            const newAlbum = {
                name,
                description,
                photos: [],
                createdAt: new Date().toISOString()
            };
            
            if (coverInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    newAlbum.cover = e.target.result;
                    albums.push(newAlbum);
                    localStorage.setItem('albums', JSON.stringify(albums));
                    resetAndReload();
                };
                reader.readAsDataURL(coverInput.files[0]);
            } else {
                albums.push(newAlbum);
                localStorage.setItem('albums', JSON.stringify(albums));
                resetAndReload();
            }
        }

        function resetAndReload() {
            document.getElementById('addAlbumForm').reset();
            document.getElementById('addAlbumModal').style.display = 'none';
            loadAlbums();
        }

        function openAlbumDetail(index) {
            const albums = JSON.parse(localStorage.getItem('albums') || '[]');
            const album = albums[index];
            
            if (album) {
                document.getElementById('albumDetailTitle').textContent = album.name;
                document.getElementById('albumDetailModal').style.display = 'block';
                document.getElementById('albumDetailModal').dataset.albumIndex = index;
                loadAlbumPhotos(album.photos || []);
            }
        }

        function loadAlbumPhotos(photos) {
            const grid = document.getElementById('albumPhotosGrid');
            
            if (photos.length === 0) {
                grid.innerHTML = '<p class="empty-state-text">No photos in this album</p>';
                return;
            }
            
            grid.innerHTML = photos.map((photo, index) => `
                <div class="album-photo-item">
                    <img src="${photo.image}" alt="${photo.title || 'Photo'}">
                    <div class="album-photo-info">
                        <h4>${photo.title || 'Untitled'}</h4>
                        <button class="album-photo-delete" onclick="removePhotoFromAlbum(${index})">&times;</button>
                    </div>
                </div>
            `).join('');
        }

        function addPhotosToCurrentAlbum() {
            const albumIndex = document.getElementById('albumDetailModal').dataset.albumIndex;
            const albums = JSON.parse(localStorage.getItem('albums') || '[]');
            const album = albums[albumIndex];
            
            // For simplicity, let's add some sample photos
            const newPhotos = [
                { title: 'Sample Photo 1', image: 'https://picsum.photos/seed/photo1/200/200.jpg' },
                { title: 'Sample Photo 2', image: 'https://picsum.photos/seed/photo2/200/200.jpg' }
            ];
            
            album.photos = [...(album.photos || []), ...newPhotos];
            localStorage.setItem('albums', JSON.stringify(albums));
            loadAlbumPhotos(album.photos);
        }

        function removePhotoFromAlbum(photoIndex) {
            const albumIndex = document.getElementById('albumDetailModal').dataset.albumIndex;
            const albums = JSON.parse(localStorage.getItem('albums') || '[]');
            const album = albums[albumIndex];
            
            album.photos.splice(photoIndex, 1);
            localStorage.setItem('albums', JSON.stringify(albums));
            loadAlbumPhotos(album.photos);
        }

        function deleteAlbum(index) {
            if (confirm('Are you sure you want to delete this album?')) {
                const albums = JSON.parse(localStorage.getItem('albums') || '[]');
                albums.splice(index, 1);
                localStorage.setItem('albums', JSON.stringify(albums));
                loadAlbums();
            }
        }

        function deleteCurrentAlbum() {
            const albumIndex = document.getElementById('albumDetailModal').dataset.albumIndex;
            deleteAlbum(parseInt(albumIndex));
            document.getElementById('albumDetailModal').style.display = 'none';
        }
    </script>
</body>
</html>
