<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav glass">
        <div class="nav-container">
            <a class="nav-btn" href="index.html">Home</a>
            <a class="nav-btn" href="gallery.html">Gallery</a>
            <a class="nav-btn" href="upload.html">Upload</a>
            <a class="nav-btn" href="display.html">Display</a>
            <a class="nav-btn" href="albums.html">Albums</a>
            <a class="nav-btn" href="portfolio.html">Portfolio</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="hero">
        <div class="decorative-element decorative-element-1"></div>
        <div class="decorative-element decorative-element-2"></div>
        <div class="hero-content">
            <h1>Visual Stories</h1>
            <p>A Collection of <span class="hero-word-rotate"><span>Moments</span><span>Memories</span><span>Visions</span><span>Dreams</span><span>Moments</span></span></p>
            <a href="gallery.html" class="cta-button">View Gallery</a>
        </div>
    </section>

    <!-- Tutorial Overlay -->
    <div class="tour-overlay" id="tourOverlay"></div>
    <div class="tour-tooltip" id="tourTooltip">
      <div class="tour-tooltip-arrow" id="tourArrow"></div>
      <div class="tour-tooltip-step" id="tourIndicator"></div>
      <h4 class="tour-tooltip-title" id="tourTitle"></h4>
      <p class="tour-tooltip-text" id="tourText"></p>
      <div class="tour-tooltip-actions">
        <button class="tour-skip" id="tourSkip">Skip</button>
        <button class="tour-next" id="tourNext">Next</button>
      </div>
    </div>

    <script src="common.js"></script>
    <script>
        setActiveNav();

        // --- Tutorial / Guide (first visit only) ---
        const tourSteps = [
          { target: '.hero-content h1', title: 'Welcome', text: 'A quick tour of your photography workspace. Only shows once.' },
          { target: '.nav-btn[href="upload.html"]', title: 'Upload', text: 'Add photos via drag & drop. They save in your browser.' },
          { target: '.nav-btn[href="gallery.html"]', title: 'Gallery', text: 'View, sort, and manage all your photos.' },
          { target: '.nav-btn[href="display.html"]', title: 'Display', text: 'Build collages — resize, rotate, crop, filter, and export.' },
          { target: '.nav-btn[href="albums.html"]', title: 'Albums', text: 'Organise photos into folders.' },
          { target: '.nav-btn[href="portfolio.html"]', title: 'Portfolio', text: 'Showcase your finished collages.' },
          { target: '.cta-button', title: 'Ready!', text: 'Start by uploading some photos.' }
        ];

        let tourStep = 0;
        const tourOverlay = document.getElementById('tourOverlay');
        const tourTooltip = document.getElementById('tourTooltip');
        const tourArrow = document.getElementById('tourArrow');

        function showTour() {
          if (localStorage.getItem(STORAGE_KEYS.tutorialDone)) return;
          tourStep = 0;
          tourOverlay.classList.add('active');
          tourTooltip.classList.add('active');
          positionTooltip();
        }

        function positionTooltip() {
          const s = tourSteps[tourStep];
          const el = document.querySelector(s.target);
          document.getElementById('tourTitle').textContent = s.title;
          document.getElementById('tourText').textContent = s.text;
          document.getElementById('tourIndicator').textContent = `${tourStep + 1} / ${tourSteps.length}`;
          document.getElementById('tourNext').textContent = tourStep === tourSteps.length - 1 ? 'Get Started' : 'Next';

          // Remove old highlight
          document.querySelectorAll('.tour-highlight').forEach(e => e.classList.remove('tour-highlight'));

          if (!el) return;
          el.classList.add('tour-highlight');

          const rect = el.getBoundingClientRect();
          const ttW = 280;
          const ttH = tourTooltip.offsetHeight || 160;

          // Position below the target, centered
          let left = rect.left + rect.width / 2 - ttW / 2;
          let top = rect.bottom + 14;
          let arrowSide = 'top';

          // If tooltip goes off bottom, show above
          if (top + ttH > window.innerHeight - 20) {
            top = rect.top - ttH - 14;
            arrowSide = 'bottom';
          }
          // Clamp horizontal
          left = Math.max(12, Math.min(window.innerWidth - ttW - 12, left));

          tourTooltip.style.left = left + 'px';
          tourTooltip.style.top = top + 'px';
          tourTooltip.style.width = ttW + 'px';
          tourArrow.className = 'tour-tooltip-arrow tour-arrow-' + arrowSide;

          // Position arrow horizontally to point at target center
          const arrowLeft = Math.max(16, Math.min(ttW - 16, rect.left + rect.width / 2 - left));
          tourArrow.style.left = arrowLeft + 'px';
        }

        document.getElementById('tourNext').addEventListener('click', () => {
          tourStep++;
          if (tourStep >= tourSteps.length) {
            closeTour();
          } else {
            positionTooltip();
          }
        });

        document.getElementById('tourSkip').addEventListener('click', closeTour);
        tourOverlay.addEventListener('click', closeTour);

        function closeTour() {
          tourOverlay.classList.remove('active');
          tourTooltip.classList.remove('active');
          document.querySelectorAll('.tour-highlight').forEach(e => e.classList.remove('tour-highlight'));
          localStorage.setItem(STORAGE_KEYS.tutorialDone, '1');
        }

        window.addEventListener('resize', () => {
          if (tourTooltip.classList.contains('active')) positionTooltip();
        });

        // Delay slightly so nav animation finishes
        setTimeout(showTour, 900);
    </script>
</body>
</html>
