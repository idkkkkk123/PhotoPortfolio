<body class="container page-main">
  <h1>Uploads moved to Admin</h1>
  <p>This page used to save photos only on <strong>this device</strong>. That is why phones and laptops showed different pictures.</p>
  <p>All visitors now see the same photos from the admin panel (saved to GitHub for everyone).</p>
  <p><a class="cta-button" href="/admin-bbpews098ge8ht4ez4xdeg/">Open admin panel</a></p>
  <script>
    ['portfolioPhotos', 'portfolioAlbums', 'portfolioCurrentAlbum', 'portfolioSavedAlbums', 'portfolioItems'].forEach(function (k) {
      try { localStorage.removeItem(k); } catch (e) {}
    });
    location.replace('/admin-bbpews098ge8ht4ez4xdeg/');
  </script>
</body>
